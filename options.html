<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitLab Pipeline List View – Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      max-width: 560px;
      margin: 40px auto;
      padding: 0 20px 40px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #303030;
      background: #fff;
    }

    h1 {
      font-size: 16px;
      font-weight: 700;
      color: #303030;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 12px;
      color: #6a737d;
      margin-bottom: 28px;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      color: #303030;
      margin-bottom: 10px;
    }

    ul {
      list-style: none;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      font-size: 13px;
      border-bottom: 1px solid #e1e4e8;
    }

    li:last-child { border-bottom: none; }

    li.builtin { color: #6a737d; }

    li .origin { font-family: monospace; font-size: 12px; }

    .btn-remove {
      font-size: 11px;
      padding: 3px 8px;
      border: 1px solid #d1d5da;
      border-radius: 4px;
      background: #fafbfc;
      color: #586069;
      cursor: pointer;
    }

    .btn-remove:hover { background: #fee; border-color: #d73a49; color: #d73a49; }

    .add-row {
      display: flex;
      gap: 8px;
    }

    .add-row input {
      flex: 1;
      padding: 7px 10px;
      font-size: 13px;
      border: 1px solid #d1d5da;
      border-radius: 6px;
      outline: none;
    }

    .add-row input:focus { border-color: #1f75cb; box-shadow: 0 0 0 2px rgba(31,117,203,.15); }

    .add-row button {
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      background: #1f75cb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .add-row button:hover { background: #1a62a8; }

    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #2ea44f;
      min-height: 16px;
    }

    .status.error { color: #d73a49; }

    .note {
      margin-top: 24px;
      padding: 10px 12px;
      background: #f6f8fa;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      font-size: 11px;
      color: #444d56;
      line-height: 1.6;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #22272e; color: #cdd9e5; }
      h1, h2 { color: #cdd9e5; }
      .subtitle { color: #768390; }
      ul { border-color: #373e47; }
      li { border-color: #373e47; }
      li.builtin { color: #768390; }
      .btn-remove { background: #2d333b; border-color: #444c56; color: #adbac7; }
      .btn-remove:hover { background: #3d2020; border-color: #d73a49; color: #f47067; }
      .add-row input { background: #2d333b; border-color: #444c56; color: #cdd9e5; }
      .add-row input:focus { border-color: #539bf5; box-shadow: 0 0 0 2px rgba(83,155,245,.2); }
      .add-row button { background: #316dca; }
      .add-row button:hover { background: #2762c0; }
      .note { background: #1c2128; border-color: #373e47; color: #adbac7; }
    }
  </style>
</head>
<body>
  <h1>☰ Pipeline List View – Settings</h1>
  <p class="subtitle">Manage the GitLab instances where the extension is active.</p>

  <h2>GitLab Instances</h2>
  <ul id="instance-list">
    <li class="builtin">
      <span class="origin">https://gitlab.com</span>
      <span>built-in</span>
    </li>
  </ul>

  <div class="add-row">
    <input type="url" id="url-input" placeholder="https://gitlab.example.com">
    <button id="add-btn">Add Instance</button>
  </div>
  <p id="status" class="status"></p>

  <div class="note">
    When you add an instance, your browser will ask you to approve access to that site.
    The extension only activates on pipeline pages (<code>/-/pipelines/…</code>).
  </div>

  <script src="options.js"></script>
</body>
</html>
